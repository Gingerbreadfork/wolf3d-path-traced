name: Build

# Builds ready-to-run Linux and Windows packages (binary + shaders + shareware
# data). Every push/PR uploads artifacts you can download from the run; pushing a
# tag like `v1.0` also publishes them as a GitHub Release.
#
# macOS is intentionally absent: the path tracer needs Vulkan hardware ray
# tracing (VK_KHR_ray_query), which MoltenVK does not implement.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # allows the release job to attach assets on a tag

jobs:
  # ---------------------------------------------------------------- Linux ----
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
                                  libsdl2-dev libvulkan-dev glslc

      - name: Configure & build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          PKG=wolf3d-path-traced-linux
          mkdir -p "$PKG/shaders" "$PKG/data"
          cp build/wolf3d-pt        "$PKG/"
          cp build/shaders/*.spv    "$PKG/shaders/"
          cp assets/data/*.wl1      "$PKG/data/"
          cp .github/PLAY.txt       "$PKG/" 2>/dev/null || true
          tar czf "$PKG.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v7
        with:
          name: wolf3d-path-traced-linux
          path: wolf3d-path-traced-linux.tar.gz

  # -------------------------------------------------------------- Windows ----
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-vulkan-devel
            mingw-w64-x86_64-vulkan-headers
            mingw-w64-x86_64-shaderc

      - name: Configure & build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          PKG=wolf3d-path-traced-windows
          mkdir -p "$PKG/shaders" "$PKG/data"
          cp build/wolf3d-pt.exe    "$PKG/"
          cp build/shaders/*.spv    "$PKG/shaders/"
          cp assets/data/*.wl1      "$PKG/data/"
          cp .github/PLAY.txt       "$PKG/" 2>/dev/null || true
          # Bundle the MinGW/SDL2 runtime DLLs the exe links against (the Vulkan
          # loader, vulkan-1.dll, is provided by the user's GPU driver).
          ldd "$PKG/wolf3d-pt.exe" | awk '/\/mingw64\/bin\// {print $3}' | sort -u \
            | while read -r dll; do cp "$dll" "$PKG/"; done

      - uses: actions/upload-artifact@v7
        with:
          name: wolf3d-path-traced-windows
          path: wolf3d-path-traced-windows

  # -------------------------------------------------- Release (on v* tags) ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ linux, windows ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Zip the Windows package
        run: |
          cd dist
          zip -r wolf3d-path-traced-windows.zip wolf3d-path-traced-windows

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wolf3d-path-traced-linux/wolf3d-path-traced-linux.tar.gz
            dist/wolf3d-path-traced-windows.zip
