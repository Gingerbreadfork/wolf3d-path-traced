name: Build

# Builds ready-to-run Linux and Windows packages for BOTH editions:
#   * shareware -- bundles the freely distributable Episode 1 data (playable as-is)
#   * full      -- built for registered data (all 6 episodes); ships the engine
#                  only, you supply your own *.wl6 files (copyrighted, NOT bundled)
# Every push/PR uploads artifacts you can download from the run; pushing a tag like
# `v1.0` also publishes them as a GitHub Release.
#
# macOS is intentionally absent: the path tracer needs Vulkan hardware ray
# tracing (VK_KHR_ray_query), which MoltenVK does not implement.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # allows the release job to attach assets on a tag

jobs:
  # ---------------------------------------------------------------- Linux ----
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        edition: [ shareware, full ]
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
                                  libsdl2-dev libvulkan-dev glslc

      - name: Configure & build
        run: |
          FLAGS=""
          if [ "${{ matrix.edition }}" = "full" ]; then FLAGS="-DWOLF_FULL=ON"; fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release $FLAGS
          cmake --build build

      - name: Package
        run: |
          PKG=wolf3d-path-traced-linux-${{ matrix.edition }}
          mkdir -p "$PKG/shaders" "$PKG/data"
          cp build/wolf3d-pt        "$PKG/"
          cp build/shaders/*.spv    "$PKG/shaders/"
          cp .github/PLAY.txt       "$PKG/" 2>/dev/null || true
          if [ "${{ matrix.edition }}" = "shareware" ]; then
            cp assets/data/*.wl1 "$PKG/data/"
          else
            cp .github/DATA-FULL.txt "$PKG/data/README.txt"
          fi
          tar czf "$PKG.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v7
        with:
          name: wolf3d-path-traced-linux-${{ matrix.edition }}
          path: wolf3d-path-traced-linux-${{ matrix.edition }}.tar.gz

  # -------------------------------------------------------------- Windows ----
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        edition: [ shareware, full ]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSYS2 (MinGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-vulkan-devel
            mingw-w64-x86_64-vulkan-headers
            mingw-w64-x86_64-shaderc

      - name: Configure & build
        run: |
          FLAGS=""
          if [ "${{ matrix.edition }}" = "full" ]; then FLAGS="-DWOLF_FULL=ON"; fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release $FLAGS
          cmake --build build

      - name: Package
        run: |
          PKG=wolf3d-path-traced-windows-${{ matrix.edition }}
          mkdir -p "$PKG/shaders" "$PKG/data"
          cp build/wolf3d-pt.exe    "$PKG/"
          cp build/shaders/*.spv    "$PKG/shaders/"
          cp .github/PLAY.txt       "$PKG/" 2>/dev/null || true
          if [ "${{ matrix.edition }}" = "shareware" ]; then
            cp assets/data/*.wl1 "$PKG/data/"
          else
            cp .github/DATA-FULL.txt "$PKG/data/README.txt"
          fi
          # Bundle the MinGW/SDL2 runtime DLLs the exe links against (the Vulkan
          # loader, vulkan-1.dll, is provided by the user's GPU driver).
          ldd "$PKG/wolf3d-pt.exe" | awk '/\/mingw64\/bin\// {print $3}' | sort -u \
            | while read -r dll; do cp "$dll" "$PKG/"; done
          zip -r "$PKG.zip" "$PKG"

      - uses: actions/upload-artifact@v7
        with:
          name: wolf3d-path-traced-windows-${{ matrix.edition }}
          path: wolf3d-path-traced-windows-${{ matrix.edition }}.zip

  # -------------------------------------------------- Release (on v* tags) ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ linux, windows ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
